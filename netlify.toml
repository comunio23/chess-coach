[build]
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[functions."claude"]
  timeout = 26

[functions."lichess-games"]
  timeout = 26

[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude"
  status = 200
  force = true

[[redirects]]
  from = "/api/explorer"
  to = "/.netlify/functions/explorer"
  status = 200
  force = true

[[redirects]]
  from = "/api/lichess/user/*"
  to = "/.netlify/functions/lichess-user"
  status = 200
  force = true

[[redirects]]
  from = "/api/lichess/games/*"
  to = "/.netlify/functions/lichess-games"
  status = 200
  force = true
